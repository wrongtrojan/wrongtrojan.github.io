<section class="mt-10">
  <script src="https://giscus.app/client.js"
        data-repo="wrongtrojan/wrongtrojan.github.io"
        data-repo-id="R_kgDOQjuwbg"
        data-category="Announcements"
        data-category-id="DIC_kwDOQjuwbs4C4pef"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="https://wrongtrojan.github.io/css/giscus-dracula.css" 
        data-lang="zh-CN"
        crossorigin="anonymous"
        async>
  </script>

  <script>
    (function() {
      // 1. 定义你的自定义 CSS 在线完整路径 (部署后)
      // 替换为你的 GitHub Pages 域名
      const customDarkTheme = "https://wrongtrojan.github.io/css/giscus-dracula.css";
      const defaultLightTheme = "light"; 

      function getGiscusTheme() {
        // 检查 Blowfish 当前的主题状态
        const isDark = document.documentElement.getAttribute("data-theme") === 'dark' || 
                       document.documentElement.classList.contains('dark');
        return isDark ? customDarkTheme : defaultLightTheme;
      }

      function updateGiscus() {
        const theme = getGiscusTheme();
        const iframe = document.querySelector('iframe.giscus-frame');
        if (!iframe) return;

        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: theme } } },
          'https://giscus.app'
        );
      }

      // 2. 监听 Blowfish 的主题切换 (MutationObserver)
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.type === 'attributes' && (mutation.attributeName === 'data-theme' || mutation.attributeName === 'class')) {
            updateGiscus();
          }
        });
      });

      observer.observe(document.documentElement, { attributes: true });

      // 3. 初始加载修正 (防止 Giscus 默认读取了错误的相对路径)
      window.addEventListener('message', (event) => {
        if (event.origin !== 'https://giscus.app') return;
        if (!(typeof event.data === 'object' && event.data.giscus)) return;
        updateGiscus();
      });
    })();
  </script>
</section>
